<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glory and Grace - Giving</title>
    <script>
        // Redirect all 404s to the home page with the path preserved
        const path = window.location.pathname;
        const segments = path.split('/').filter(Boolean);
        
        // If accessing a subpath, redirect to root
        if (segments.length > 1 || (segments.length === 1 && segments[0] !== 'gloryandgracegiving.github.io')) {
            window.location.replace('/gloryandgracegiving.github.io/');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
